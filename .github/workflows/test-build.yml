name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: nubjs/setup-nub@v0

      - name: Install dependencies
        run: nub ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Type check (svelte-check + tsc)
        run: nub run check

      - name: Lint (oxfmt + oxlint)
        run: nub run lint

      - name: Frontend unit tests (Vitest)
        run: nub run test:unit

      - name: Rust unit tests (cargo test)
        run: nub run test:rust

  build-desktop:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: nubjs/setup-nub@v0

      - name: Install dependencies
        run: nub ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri
        run: nub run tauri build -- --target ${{ matrix.target }}

  build-android:
    needs: check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: nubjs/setup-nub@v0

      - name: Install dependencies
        run: nub ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Init Android project
        run: nub run tauri android init

      - name: Build Android
        run: nub run tauri android build

  build-ios:
    needs: check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: nubjs/setup-nub@v0

      - name: Install dependencies
        run: nub ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri

      - name: Init iOS project
        run: nub run tauri ios init

      - name: Build iOS
        run: nub run tauri ios build
