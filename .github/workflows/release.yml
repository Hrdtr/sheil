name: Release

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-24.04
            args: --target x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
      - uses: nubjs/setup-nub@v0

      - name: Install dependencies
        run: nub ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build and publish
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri
          tauriScript: nub run tauri
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: 'See [CHANGES.md](https://github.com/Hrdtr/sheil/blob/main/CHANGES.md) for a complete list of changes.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish-android:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: nubjs/setup-nub@v0

      - name: Install dependencies
        run: nub ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Init Android project
        run: nub run tauri android init

      - name: Build and publish Android
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri
          tauriScript: nub run tauri
          mobile: android
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: 'See [CHANGES.md](https://github.com/Hrdtr/sheil/blob/main/CHANGES.md) for a complete list of changes.'
          releaseDraft: true
          prerelease: false

  publish-ios:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: nubjs/setup-nub@v0

      - name: Install dependencies
        run: nub ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri

      - name: Init iOS project
        run: nub run tauri ios init

      - name: Build and publish iOS
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri
          tauriScript: nub run tauri
          mobile: ios
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: 'See [CHANGES.md](https://github.com/Hrdtr/sheil/blob/main/CHANGES.md) for a complete list of changes.'
          releaseDraft: true
          prerelease: false
