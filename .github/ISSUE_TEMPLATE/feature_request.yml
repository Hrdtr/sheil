name: Feature Request
description: Suggest a new feature for Sheil
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide as much detail as you can.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Are there any workarounds or alternative approaches?
  - type: input
    id: protocol
    attributes:
      label: Related Protocol
      description: Is this related to SSH, telnet, serial, or another protocol?
      placeholder: e.g. SSH, telnet, serial
